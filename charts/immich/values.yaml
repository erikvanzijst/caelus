# Wrapper ingress exposed by this chart (upstream ingress is disabled).
ingress:
  enabled: true
  className: traefik
  annotations: {}
  host: "immich.local"

storage:
  library:
    accessMode: ReadWriteOnce
    size: 100Gi
    storageClassName: ""

postgresql:
  enabled: true
  image:
    repository: ghcr.io/immich-app/postgres
    tag: 14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    pullPolicy: IfNotPresent
  auth:
    username: postgres
    password: postgres
    database: immich
  persistence:
    accessMode: ReadWriteOnce
    size: 20Gi
    storageClassName: ""

# Values passed to upstream immich dependency chart.
immich:
  enabled: true

  controllers:
    main:
      containers:
        main:
          envFrom:
            - secretRef:
                name: postgresql-auth
          env:
            DB_HOSTNAME: postgresql
            DB_PORT: "5432"
            DB_VECTOR_EXTENSION: vectorchord

  immich:
    persistence:
      library:
        existingClaim: library

  valkey:
    enabled: true
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi

  server:
    ingress:
      main:
        enabled: false
