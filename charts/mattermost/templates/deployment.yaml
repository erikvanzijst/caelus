apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mattermost.fullname" . }}
  labels:
    app.kubernetes.io/name: mattermost
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: mattermost
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mattermost
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: init-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ include "mattermost.postgresql.fullname" . }} 5432; do echo "waiting for postgresql"; sleep 2; done
      containers:
        - name: mattermost
          image: "{{ .Values.mattermost.image.repository }}:{{ .Values.mattermost.image.tag }}"
          imagePullPolicy: {{ .Values.mattermost.image.imagePullPolicy }}
          env:
            - name: MM_CONFIG
              valueFrom:
                secretKeyRef:
                  name: {{ include "mattermost.fullname" . }}-db
                  key: MM_CONFIG
            {{- if .Values.host }}
            - name: MM_SERVICESETTINGS_SITEURL
              value: {{ printf "https://%s" .Values.host | quote }}
            {{- end }}
            {{- range $name, $value := .Values.mattermost.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          ports:
            - containerPort: 8065
              name: http
          startupProbe:
            initialDelaySeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
            periodSeconds: 10
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            initialDelaySeconds: 1
            failureThreshold: 3
            timeoutSeconds: 5
            periodSeconds: 10
            httpGet:
              path: /api/v4/system/ping
              port: http
          readinessProbe:
            initialDelaySeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
            periodSeconds: 10
            httpGet:
              path: /api/v4/system/ping
              port: http
          volumeMounts:
            - name: mattermost-data
              mountPath: /mattermost/data
            - name: mattermost-config
              mountPath: /mattermost/config
            - name: mattermost-plugins
              mountPath: /mattermost/plugins
      volumes:
        - name: mattermost-data
          persistentVolumeClaim:
            claimName: {{ include "mattermost.fullname" . }}-data
        - name: mattermost-config
          emptyDir: {}
        - name: mattermost-plugins
          persistentVolumeClaim:
            claimName: {{ include "mattermost.fullname" . }}-plugins
