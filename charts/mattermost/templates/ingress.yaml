{{- $host := .Values.host }}
{{- $mm := index .Values "mattermost-team-edition" }}
{{- if and $host $mm.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-mattermost-ingress
  labels:
    app.kubernetes.io/name: mattermost-team-edition
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  ingressClassName: {{ $mm.ingress.className }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ $mm.ingress.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-team-edition
                port:
                  number: 8065
{{- end }}
