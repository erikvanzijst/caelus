{{- $mattermost := index .Values "mattermost-team-edition" -}}
{{- $postgresql := .Values.postgresql -}}
{{- if $mattermost.externalDB.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-mattermost-team-edition-mattermost-dbsecret
  labels:
    app.kubernetes.io/name: mattermost-team-edition
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: mattermost-team-edition-{{ .Chart.Version }}
  annotations:
    helm.sh/hook: post-install,post-upgrade,pre-install,pre-upgrade
    helm.sh/hook-weight: "100"
type: Opaque
data:
  mattermost.dbsecret: {{ printf "postgres://%s:%s@%s-postgresql:5432/%s?sslmode=disable&connect_timeout=10" $postgresql.username $postgresql.password .Release.Name $postgresql.database | b64enc | quote }}
{{- end }}
