# Default values for mattermost self-contained Helm chart
# This chart bundles PostgreSQL with Mattermost Team Edition

host: ""

mattermost:
  image:
    repository: mattermost/mattermost-team-edition
    tag: "11.4.2"
    imagePullPolicy: IfNotPresent
  ingress:
    className: "traefik"
    path: /
  extraEnv:
    # https://docs.mattermost.com/administration-guide/configure/environment-configuration-settings.html
    TZ: Europe/Amsterdam
    MM_CALLS_GROUP_CALLS_ALLOWED: "true"
    MM_PLUGINSETTINGS_ENABLEUPLOADS: "true"

# PostgreSQL configuration
postgresql:
  image: postgres
  imageTag: "18"
  username: postgres
  password: postgres
  database: postgres
  size: 10Gi
