services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=caelus
      - POSTGRES_PASSWORD=caelus
      - POSTGRES_DB=caelus
    ports:
      - "5432:5432"
    volumes:
      - ./var/pg_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    # Allow Chrome sandboxing:
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    shm_size: "1gb"
    ports:
      - "8000:8000"
      - "5173:5173"
    environment:
      - CAELUS_DATABASE_URL=postgresql+psycopg://caelus:caelus@postgres:5432/caelus
      - KUBECONFIG=/workspace/k8s/kubeconfigs/dev-k3s.yaml
    volumes:
      - .:/workspace
    depends_on:
      - postgres
