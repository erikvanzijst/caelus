{{- $tokenKey := default "registration-token" .Values.registration.tokenSecretRef.key -}}
{{- $hasInlineToken := ne (trim .Values.registration.token) "" -}}
{{- $hasSecretRef := ne (trim .Values.registration.tokenSecretRef.name) "" -}}
{{- if and $hasInlineToken (not $hasSecretRef) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "matrix.registrationSecretName" . }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $tokenKey }}: {{ .Values.registration.token | quote }}
{{- end }}
