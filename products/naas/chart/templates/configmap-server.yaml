apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "naas.fullname" . }}-server
  labels:
    app.kubernetes.io/name: {{ include "naas.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  server.py: |
    import http.server
    import os
    import random

    IMAGE_DIR = "/images"

    CONTENT_TYPES = {
        ".jpg": "image/jpeg",
        ".jpeg": "image/jpeg",
        ".png": "image/png",
        ".gif": "image/gif",
        ".webp": "image/webp",
    }

    class RandomNoHandler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                self.send_response(200)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(b"ok")
                return

            images = [
                f for f in os.listdir(IMAGE_DIR)
                if os.path.splitext(f)[1].lower() in CONTENT_TYPES
            ]
            if not images:
                self.send_response(500)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(b"NO images found (ironic)")
                return

            chosen = random.choice(images)
            ext = os.path.splitext(chosen)[1].lower()
            filepath = os.path.join(IMAGE_DIR, chosen)

            with open(filepath, "rb") as f:
                data = f.read()

            self.send_response(200)
            self.send_header("Content-Type", CONTENT_TYPES[ext])
            self.send_header("Content-Length", str(len(data)))
            self.send_header("X-No-Meme", chosen)
            self.send_header("Cache-Control", "no-store")
            self.end_headers()
            self.wfile.write(data)

        def log_message(self, format, *args):
            print(f"{self.address_string()} - {format % args}")

    port = int(os.environ.get("PORT", "8080"))
    server = http.server.HTTPServer(("0.0.0.0", port), RandomNoHandler)
    print(f"No As A Service listening on :{port}")
    print(f"Loaded {len(os.listdir(IMAGE_DIR))} NO memes")
    server.serve_forever()
